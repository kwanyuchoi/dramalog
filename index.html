  :root {
    --primary: #006FFD;
    --primary-press: #0058CC;
    --tag-bg: #EAF2FF;
    --prog-wrap: #F8F9FE;
    --prog-track: #E8E9F1;
    --text: #1F2024;
    --text-2: #71727A;
    --text-3: #A2A7B0;
    --bg: #FFFFFF;
    --canvas: #ECF3FD;
    --surface: #FFFFFF;
    --surface-2: #F7F8FB;
    --border: rgba(0,0,0,0.06);
    --border-strong: rgba(0,0,0,0.10);
    --success: #16A36A;
    --danger: #E24B4A;
    --tab-label: #1a1a1a;      /* Figma token: Labels - Vibrant - Controls/Primary */
    --tab-fill: rgba(120,120,128,0.12);    /* iOS secondaryFill */
    --top-grad: linear-gradient(180deg, rgba(24,139,239,0.30) 0%, rgba(227,242,251,0.30) 32.2%, rgba(255,255,255,0.30) 40.3%);
    --r-pill: 999px;
    --r-card: 16px;
    --r-btn: 12px;
    --r-tag: 10px;
    --app-max: 430px;
    --tab-h: 64px;
    /* —— 动效系统（全局可复用）—— */
    --ease-out: cubic-bezier(.16,1,.3,1);       /* 主进入：快速响应、柔和停住 */
    --ease-in: cubic-bezier(.55,0,1,.45);       /* 退出：短促收走 */
    --ease-liquid: cubic-bezier(.22,1,.36,1);   /* Liquid Glass 位移/状态切换 */
    --ease-spring: cubic-bezier(.34,1.56,.64,1);/* 轻微弹性（icon pop）*/
    --spring: var(--ease-spring);               /* 别名，兼容旧引用 */
    --ease-tab: cubic-bezier(.34,1.18,.64,1);   /* 胶囊位移：弹性回落 */
    --dur-tap:160ms; --dur-card:180ms; --dur-screen:320ms; --dur-tab:220ms; --dur-detail-in:460ms; --dur-detail-out:220ms;
  }
  html.dark {
    --primary: #2E92FF; --primary-press: #0A7BFF;
    --tag-bg: rgba(46,146,255,0.16); --prog-wrap: rgba(46,146,255,0.10);
    --prog-track: rgba(255,255,255,0.12);
    --text: #F2F3F5; --text-2: #9CA0A8; --text-3: #5C606A;
    --bg: #000000; --surface: #1C1C1E; --surface-2: #2C2C2E; --canvas: #0B0C0F;
    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);
    --tab-label: rgba(235,235,245,0.55); --tab-fill: rgba(120,120,128,0.24);
    --top-grad: linear-gradient(180deg, rgba(46,146,255,0.22) 0%, rgba(20,40,70,0.30) 32%, rgba(0,0,0,0) 42%);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body { min-height: 100%; background: var(--canvas); font-family: 'SN Pro', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif; color: var(--text); }
  body { display: flex; align-items: stretch; justify-content: stretch; min-height: 100vh; padding: 0; overflow: hidden; }
  .tnum { font-variant-numeric: tabular-nums; }

  /* 真机满屏自适应（消除黑边）；桌面 ≥480 才显示 375×812 居中预览框 */
  #app {
    position: relative; width: 100%; height: 100vh; height: 100dvh; flex-shrink: 0;
    background: var(--canvas);
    display: flex; flex-direction: column; overflow: hidden;
  }
  @media (min-width: 480px) {
    html, body { background: #15161a; }
    body { align-items: center; justify-content: center; padding: 24px; overflow: auto; }
    #app { width: 375px; height: 812px; border-radius: 44px; box-shadow: 0 30px 80px rgba(0,0,0,.5); }
  }

  /* —— 全局隐藏滚动条 —— */
  .screen, #detail-screen, #list-screen, .d-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .screen::-webkit-scrollbar, #detail-screen::-webkit-scrollbar, #list-screen::-webkit-scrollbar, .d-scroll::-webkit-scrollbar { display: none !important; width: 0; height: 0; }

  /* —— 状态栏（预览用；真机可删） —— */
  .status-bar { flex-shrink:0; height: calc(44px + env(safe-area-inset-top)); padding: 0 22px; padding-top: env(safe-area-inset-top); display:flex; align-items:center; justify-content:space-between; font-size:15px; font-weight:600; color: var(--text); position:relative; z-index:20; }
  .status-bar .sb-time { font-variant-numeric: tabular-nums; letter-spacing:.2px; }
  .status-bar .sb-right { display:flex; align-items:center; gap:6px; }

  /* —— 屏幕 —— */
  .screen { display: none; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom: calc(var(--tab-h) + 56px); }
  .screen.active { display:block; animation: screen-enter var(--dur-screen) var(--ease-out); }
  @keyframes screen-enter { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
  @keyframes show-card-enter { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform:none; } }
  @keyframes tab-icon-pop { 0%{transform:scale(1)} 45%{transform:scale(1.18)} 100%{transform:scale(1.08)} }
  @keyframes tab-label-settle { from{opacity:.4; transform:translateY(2px)} to{opacity:1; transform:none} }
  @keyframes detail-summary-enter { from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none} }
  @keyframes season-card-enter { from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none} }

  /* —— 页面大标题 + 计数（垂直居中对齐） —— */
  .page-title-row { display:flex; align-items:center; gap:8px; padding: 24px 16px; }
  .page-title { font-size:24px; font-weight:650; color: var(--text); letter-spacing:.24px; }
  .page-title.sm { font-size:18px; letter-spacing:.09px; }

  .d-toolbar-bottom { position:static; flex-shrink:0; z-index:6; display:flex; flex-wrap:wrap; gap:10px; padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:none; }
  .lg-btn { flex:1; height:58px; border-radius:14px; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; border:none; color:var(--text); font-size:16px; font-weight:600; font-family:inherit;
    background:rgba(255,255,255,0.8); -webkit-backdrop-filter:blur(20px) saturate(180%); backdrop-filter:blur(20px) saturate(180%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6), 0 8px 40px rgba(0,0,0,.12); transition:transform .16s var(--spring); }
  .lg-btn:active { transform:scale(.97); }
  .lg-btn svg { width:18px; height:18px; }
  .lg-btn.primary { background:var(--primary); color:#fff; box-shadow:0 8px 24px rgba(0,111,253,.3); }
  .lg-btn.danger { color:var(--danger); }

  /* ============ 列表二级页 ============ */
  .list-nav { position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:8px; padding: calc(40px + env(safe-area-inset-top)) 16px 10px; background:var(--canvas); }
  .list-nav .lt { flex:1; text-align:center; font-size:16px; font-weight:650; color:var(--text); letter-spacing:.08px; }
  .list-nav .nav-spacer { width:44px; flex-shrink:0; }
  .filter-chips { display:flex; gap:8px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; }
  .filter-chips::-webkit-scrollbar { display:none; }
  .chip { flex-shrink:0; padding:8px 16px; border-radius:12px; background:var(--surface); font-size:12px; font-weight:600; color:var(--text); cursor:pointer; border:1px solid transparent; transition: transform var(--dur-card) var(--ease-out), background .2s, color .2s; }
  .chip:active { transform:scale(.96); }
  .chip.active { background:var(--tag-bg); border-color:var(--primary); color:var(--primary); }
  .lcard { display:flex; gap:16px; background:var(--surface); border-radius:24px; padding:12px; margin:0 16px 16px; cursor:pointer; transition: transform var(--dur-card) var(--ease-out); }
  .lcard:active { transform:scale(.985); }
  .lcard img.lp { width:90px; height:120px; border-radius:16px; object-fit:cover; background:var(--prog-track); flex-shrink:0; }
  .lcard .lcb { flex:1; min-width:0; display:flex; flex-direction:column; gap:8px; }
  .lcard .lcb .ln { font-size:16px; font-weight:650; color:var(--text); }
  .lcard .lcb .lsub { font-size:12px; color:var(--text-2); font-variant-numeric:tabular-nums; }
  .stag { align-self:flex-start; display:inline-flex; align-items:center; gap:4px; padding:6px 8px; border-radius:16px; font-size:12px; font-weight:500; }
  .stag.green { background:#edfdee; color:#03d683; }
  .stag.orange { background:#fff4e4; color:#ff9b4b; }
  .stag.blue { background:#eaf2ff; color:#2897ff; }
  .stag.gray { background:#f3f4f6; color:#8f9098; }

  .toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.92); background:rgba(47,48,54,.9); color:#d4d6dd; padding:16px; border-radius:16px; font-size:14px; font-weight:400; opacity:0; transition:opacity .25s var(--ease-out), transform .3s var(--spring); z-index:999; white-space:nowrap; pointer-events:none; max-width:80%; text-align:center; }
  .toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }

  @media (prefers-reduced-motion: reduce) {
    .tab-indicator, .tab-item .ic, .screen.active, #detail-screen, #list-screen { transition: none !important; animation: none !important; }
  }
</style>

const LS_KEY = 'dramalog_hifi_v3';
let shows = JSON.parse(localStorage.getItem(LS_KEY) || 'null') || SEED_SHOWS.map(s => ({...s}));
let calendarDate = new Date();

function saveData() { localStorage.setItem(LS_KEY, JSON.stringify(shows)); }
function $(id){ return document.getElementById(id); }
function pad(n){ return String(n).padStart(2,'0'); }
function getPct(s){ return s.totalEps>0 ? Math.round(s.watchedEps/s.totalEps*100) : 0; }
function absEpNum(s, season, ep){ let a=0; for(const ss of s.seasons){ if(ss.num===season) return a+ep; a+=ss.eps; } return a+ep; }
function isAired(s, season, ep){ const a = s.airedEps || s.totalEps; return absEpNum(s,season,ep) <= a; }
function caughtUp(s){ const a = s.airedEps || s.totalEps; return a>0 && s.watchedEps>=a; }
function getCurrentSeason(s, epNum){ let c=0; for(const sn of s.seasons){ if(epNum<=c+sn.eps) return sn.num; c+=sn.eps; } return s.seasons[s.seasons.length-1].num; }
function getEpInSeason(s, epNum){ let c=0; for(const sn of s.seasons){ if(epNum<=c+sn.eps) return epNum-c; c+=sn.eps; } return 1; }
function getSeasonState(s){
  const target = s.watchedEps + 1;
  let acc=0, season=s.seasons[0];
  for(const ss of s.seasons){ season=ss; if(target<=acc+ss.eps) break; acc+=ss.eps; }
  const epInSeason = Math.max(1, target-acc);
  const total = season.eps;
  const watched = Math.max(0, Math.min(epInSeason-1, total));
  return { season: season.num, ep: Math.min(epInSeason,total), watched, total, pct: total>0?Math.round(watched/total*100):0 };
}
function countdown(date){
  if(!date) return null;
  const diff = date - Date.now();
  if(diff<=0) return {done:true};
  const h = Math.floor(diff/3600000);
  if(h<24) return {val:h, label:'小时后', done:false};
  return {val: Math.floor(h/24), label:'天后', done:false};
}

// —— Tab 切换（含滑动指示器 + 切屏淡入） ——
const TAB_INDEX = { shows:0, calendar:1, discover:2, mine:3 };
function switchTab(tab, el){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  $('screen-'+tab).classList.add('active');
  el.classList.add('active');
  $('tab-indicator').style.transform = 'translateX('+(TAB_INDEX[tab]*100)+'%)';
  if(tab==='shows') renderShows();
  if(tab==='calendar') renderCalendar();
  if(tab==='discover') renderDiscover();
  if(tab==='mine') renderMine();
}

// ══ 剧集页 ══
function renderShows(){
  const watching = shows.filter(s=>s.status==='watching').sort((a,b)=>(b.lastWatched||0)-(a.lastWatched||0));
  const upcoming = shows.filter(s=>s.status==='upcoming');
  $('watching-count').textContent = watching.length;
  $('upcoming-count').textContent = upcoming.length;
  $('watching-list').innerHTML = watching.length ? watching.map(showCard).join('')
    : '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/></svg><p>还没有追的剧，去发现页添加吧</p></div>';
  $('upcoming-list').innerHTML = upcoming.length ? upcoming.map(upcomingCard).join('') : '<div class="empty-hint">暂无即将开播的剧集</div>';
}
function seTag(season, ep){ return `<div class="se-tag"><span class="season">S${pad(season)}</span><span class="dot"></span><span class="ep">第 ${ep} 集</span></div>`; }
function progRow(watched, total){ const pct = total>0 ? Math.round(watched/total*100) : 0; return `<div class="prog-row"><div class="prog-wrap"><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div></div><span class="prog-num">${watched}/${total}</span></div>`; }
function showCard(s){
  const st = getSeasonState(s);
  return `<div class="show-card" onclick="openDetail(${s.id})">
    <img class="poster" src="${s.poster}" alt="${s.name}" onerror="this.style.opacity=0">
    <div class="show-body">
      <div class="show-name">${s.name}</div>
      ${seTag(st.season, st.ep)}
      <div class="show-sub">${s.sub || ('第 '+st.ep+' 集')}</div>
      ${progRow(st.watched, st.total)}
    </div>
    <button class="btn-read" onclick="event.stopPropagation();markWatched(${s.id})"><svg class="ic"><use href="#ic-check"/></svg>已阅</button>
  </div>`;
}
function upcomingCard(s){
  const ne = s.nextEpisode;
  const cd = countdown(s.nextAirDate);
  const epDisp = ne ? ne.ep - 1 : 0;
  const cdText = !cd ? '等待更新' : cd.done ? '已更新' : (cd.val + cd.label);
  const curSeason = ne ? ne.season : s.seasons[s.seasons.length-1].num;
  const curEps = (s.seasons.find(x=>x.num===curSeason)||{}).eps || 1;
  const prev = s.seasons.filter(x=>x.num<curSeason).reduce((a,x)=>a+x.eps,0);
  const aired = s.airedEps || s.totalEps;
  const airedInSeason = Math.max(0, Math.min(aired-prev, curEps));
  return `<div class="show-card" onclick="openDetail(${s.id})">
    <img class="poster" src="${s.poster}" alt="${s.name}" onerror="this.style.opacity=0">
    <div class="show-body">
      <div class="show-name">${s.name}</div>
      ${seTag(curSeason, epDisp)}
      ${progRow(airedInSeason, curEps)}
    </div>
    <div class="cd-tag">${cdText}</div>
  </div>`;
}
function markWatched(id){
  const s = shows.find(x=>x.id===id);
  if(!s) return;
  const aired = s.airedEps || s.totalEps;
  if(s.watchedEps >= aired){ showToast('已追平最新更新，等待新集'); return; }
  s.watchedEps++; s.lastWatched = Date.now();
  if(caughtUp(s)) s.status = 'upcoming';
  saveData(); renderShows();
  const ns = getCurrentSeason(s, s.watchedEps), ne = getEpInSeason(s, s.watchedEps);
  showToast(`✓ ${s.name} S${pad(ns)} · 第 ${ne} 集已阅${caughtUp(s)?'（已追平）':''}`);
}

const TMDB_KEY='52be23dfb77f93ecc770fcfcacb20cb4';

const TMDB_IMG='https://image.tmdb.org/t/p';
function tmdbImg(p,sz){ return p?`${TMDB_IMG}/${sz||'w342'}${p}`:''; }
async function tmdb(path,params){
  if(!TMDB_KEY) return null;
  const u=new URL(TMDB_BASE+path); u.searchParams.set('api_key',TMDB_KEY); u.searchParams.set('language','zh-CN');
  if(params) Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));

}

function addToPlan(id){ const s=shows.find(x=>x.id===id); s.status='plan'; s.lastWatched=Date.now(); saveData(); renderDetailActions(s); showToast('已添加到想看'); }
function markAllEps(id){ const s=shows.find(x=>x.id===id); s.watchedEps=s.airedEps||s.totalEps; s.status='upcoming'; s.lastWatched=Date.now(); saveData(); $('d-fill').style.width=getPct(s)+'%'; $('d-pct').textContent=getPct(s)+'%'; renderSeasons(s); renderDetailActions(s); showToast('✓ 已标记全部已播集看完'); }
function cancelWatching(id){ const s=shows.find(x=>x.id===id); s.status='plan'; s.lastWatched=Date.now(); saveData(); renderDetailActions(s); showToast('已移到想看，可继续浏览'); }
function startWatching(id){ const s=shows.find(x=>x.id===id); s.status='watching'; s.lastWatched=Date.now(); saveData(); renderDetailActions(s); showToast('✓ 已加入我在追'); }

// ══ 日历页 ══
function renderCalendar(){
  const y=calendarDate.getFullYear(), m=calendarDate.getMonth();
  $('month-title').textContent = `${y}年${m+1}月`;
  const firstDay=new Date(y,m,1).getDay(), daysInMonth=new Date(y,m+1,0).getDate(), daysInPrev=new Date(y,m,0).getDate(), today=new Date();
  const ups=getCalendarUpdates(y,m); let html='';
  for(let i=firstDay-1;i>=0;i--) html+=`<div class="cal-day other">${daysInPrev-i}</div>`;
  for(let d=1; d<=daysInMonth; d++){
    const isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const isSel=selectedCalDay.getFullYear()===y&&selectedCalDay.getMonth()===m&&selectedCalDay.getDate()===d;
    const has=!!(ups[d]&&ups[d].length);
    html+=`<div class="cal-day ${isToday?'cur':''} ${isSel?'sel':''}" onclick="selectDay(${y},${m},${d})">${d}${has?'<div class="dot"></div>':''}</div>`;
  }
  $('cal-grid').innerHTML=html; renderCalList(y,m);
}
function getCalendarUpdates(y,m){ const map={}; shows.forEach(s=>{ if(s.status!=='watching'&&s.status!=='upcoming') return; if(s.nextAirDate){ const dt=new Date(s.nextAirDate); if(dt.getFullYear()===y&&dt.getMonth()===m){ (map[dt.getDate()]=map[dt.getDate()]||[]).push(s); } } }); return map; }
function changeMonth(d){ calendarDate.setMonth(calendarDate.getMonth()+d); renderCalendar(); }
function selectDay(y,m,d){ selectedCalDay=new Date(y,m,d); renderCalendar(); }
function renderCalList(y,m){
  const ups=getCalendarUpdates(y,m), d=selectedCalDay.getDate(), list=ups[d]||[];
  $('cal-list').innerHTML = list.length ? list.map(s=>{
    const st=getSeasonState(s); const time=s.nextAirDate?(new Date(s.nextAirDate).getHours()+':00'):'9:00';
    return `<div class="cal-ep" onclick="openDetail(${s.id})">

  const ns={ id:Date.now(), name:s.name, poster:s.poster, emoji:'', sub:'', totalEps:0, watchedEps:0, epDuration:24, status, lastWatched:Date.now(), seasons:[{num:1,eps:0}], airedEps:0, nextAirDate:null, nextEpisode:null };
  if(s.tmdbId) ns.tmdbId=s.tmdbId;
  shows.push(ns); saveData(); renderShows(); renderMine();
  showToast(status==='watching'?`✓ 已添加「${s.name}」到我在追`:`✓ 已添加「${s.name}」到想看`);
}
// TMDB 搜索（返回列表）
async function tmdbSearchList(q){
  const j=await tmdb('/search/tv',{query:q,page:1});
  if(!j||!j.results) return [];
  return j.results.filter(r=>r.poster_path).slice(0,12).map(r=>({
    tmdbId:r.id, name:r.name||r.original_name, poster:tmdbImg(r.poster_path,'w342'),
    rating:r.vote_average?r.vote_average.toFixed(1):'—', year:(r.first_air_date||'').slice(0,4),
    overview:(r.overview||'').slice(0,70)
  }));
}
function addFromTmdbByIdx(i){
  const r=window._srList&&window._srList[i]; if(!r) return;
  if(shows.some(s=>s.tmdbId===r.tmdbId)){ openDetail(shows.find(s=>s.tmdbId===r.tmdbId).id); return; }
  const id=Math.max(0,...shows.map(s=>s.id))+1;
  shows.push({ id, name:r.name, poster:r.poster, emoji:'🎬', status:'plan',
    seasons:[{num:1,eps:1}], totalEps:1, watchedEps:0, epDuration:24, tmdbId:r.tmdbId,
    lastWatched:Date.now(), sub:'' });
  saveData(); showToast('✓ 已添加「'+r.name+'」');
  $('search-input').value=''; handleSearch('');
  openDetail(id);
}
let _searchTimer;
function handleSearch(q){
  const el=$('search-results'), main=$('discover-main');
  if(!q||!q.trim()){ el.style.display='none'; el.innerHTML=''; main.style.display='block'; clearTimeout(_searchTimer); return; }
  main.style.display='none'; el.style.display='block';
  const local=shows.filter(s=>s.name.includes(q));
  let html='';
  if(local.length) html+='<div class="sr-label">我的剧集</div><div style="padding:0 0 4px">'+local.map(s=>'<div class="lcard" onclick="openDetail('+s.id+')"><img class="lp" src="'+s.poster+'" onerror="this.style.opacity=.2"><div class="lcb"><div class="ln">'+s.name+'</div><div class="lsub">'+s.seasons.length+' 季 · '+s.watchedEps+'/'+s.totalEps+' 集</div>'+statusTagOf(s)+'</div></div>').join('')+'</div>';
  html+='<div class="sr-label">TMDB 搜索'+(TMDB_KEY?'':'（未配置 key）')+'</div><div id="sr-tmdb" class="sr-loading">搜索中…</div>';
  el.innerHTML=html;
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(async()=>{
    const box=$('sr-tmdb'); if(!box) return;
    if(!TMDB_KEY){ box.innerHTML='<div class="sr-empty">未配置 TMDB key，无法搜索</div>'; return; }
    const list=await tmdbSearchList(q);
    if(!list.length){ box.innerHTML='<div class="sr-empty">TMDB 没有匹配「'+q+'」的结果</div>'; return; }
    window._srList=list;
    box.innerHTML='<div style="padding:0 0 4px">'+list.map((r,i)=>'<div class="lcard"><img class="lp" src="'+r.poster+'" onerror="this.style.opacity=.2"><div class="lcb"><div class="ln">'+r.name+'</div><div class="lsub">'+(r.year?r.year+' · ':'')+'★ '+r.rating+'</div><div class="sr-ov">'+(r.overview||'')+'</div></div><button class="sr-add" onclick="addFromTmdbByIdx('+i+')">'+(shows.some(s=>s.tmdbId===r.tmdbId)?'已添加':'添加')+'</button></div>').join('')+'</div>';
  },380);
}

function closeList(){ const ls=$('list-screen'); ls.style.transition='transform 220ms var(--ease-in), opacity 220ms var(--ease-in)'; ls.classList.remove('open'); }

function toggleDarkMode(){
  document.documentElement.classList.toggle('dark');
  const dark=document.documentElement.classList.contains('dark');
  $('dm-icon').innerHTML = dark
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}
function showToast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
function tickClock(){ const d=new Date(); $('sb-time').textContent=d.getHours()+':'+pad(d.getMinutes()); }

// 初始化
if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches){ document.documentElement.classList.add('dark'); $('dm-icon').innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/>'; }
tickClock(); setInterval(tickClock, 10000);
renderShows();
